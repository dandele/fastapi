[pytest]
# Configurazione pytest per BeeBus Invoice Extractors

# Percorso dei test
testpaths = tests

# Pattern per i file di test
python_files = test_*.py

# Pattern per le classi di test
python_classes = Test*

# Pattern per le funzioni di test
python_functions = test_*

# Opzioni di default
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizzati
markers =
    unit: Test unitari per singole funzioni
    integration: Test di integrazione con PDF reali
    critical: Test critici che devono passare prima del merge
    tamoil: Test specifici per Tamoil
    esso: Test specifici per Esso
    ip: Test specifici per IP
    q8: Test specifici per Q8

# Filtri per warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
